<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>je4ndev — footer</title>
  <link rel="icon" href="/portfolio-refresh/brand-icon.svg" />
  <link rel="stylesheet" href="/portfolio-refresh/colors_and_type.css" />
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    html,body { margin:0; padding:0; background:#050505; color:#ededed; font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }

    footer.site {
      position: relative;
      background: #050505;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    /* Soft accent gradient at top edge */
    footer.site::before {
      content: '';
      position: absolute; left: 0; right: 0; top: -1px; height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(94,234,212,0.45) 30%, rgba(236,72,153,0.45) 70%, transparent 100%);
      opacity: 0.6;
    }

    .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      align-items: center;
    }
    @media (min-width: 720px) {
      .grid { grid-template-columns: 1fr auto 1fr; }
    }

    /* ===== LEFT — copyright ===== */
    .footer-left {
      display: flex; flex-direction: column; gap: 6px;
      text-align: center;
      align-items: center;
    }
    @media (min-width: 720px) {
      .footer-left { text-align: left; align-items: flex-start; }
    }
    .copyright {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 13px; color: #71717a;
    }
    .brand-mini {
      width: 22px; height: 22px; border-radius: 7px;
      border: 1px solid rgba(103,232,249,0.25);
      background: #050505; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 14px -6px rgba(34,211,238,0.7);
    }
    .brand-mini::before { content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 25% 20%, rgba(34,211,238,0.32), transparent 36%),
                  radial-gradient(circle at 78% 82%, rgba(168,85,247,0.36), transparent 38%); }
    .brand-mini-glyph {
      position: relative; font-family: var(--font-mono); font-weight: 900; font-size: 9px; line-height: 1;
    }
    .brand-mini-glyph .j { color: #5EEAD4; }
    .brand-mini-glyph .four { color: #EC4899; }
    .copyright .word { color: #d4d4d8; }
    .copyright .word .dev { color: #EC4899; }
    .built {
      font-size: 11px; color: #3f3f46; letter-spacing: 0.02em;
    }

    /* ===== CENTER — social pills ===== */
    .socials {
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .social-pill {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: #a1a1aa;
      transition: all .25s;
    }
    .social-pill:hover {
      color: #fff; transform: translateY(-2px);
      border-color: var(--hov, rgba(255,255,255,0.2));
      background: var(--bg, rgba(255,255,255,0.06));
      box-shadow: 0 12px 24px -10px var(--shadow, rgba(255,255,255,0.15));
    }
    .social-pill[data-net="gh"]  { --hov: rgba(255,255,255,0.25); --shadow: rgba(255,255,255,0.2); }
    .social-pill[data-net="li"]  { --hov: rgba(56,144,232,0.5);   --bg: rgba(56,144,232,0.08);  --shadow: rgba(56,144,232,0.3); }
    .social-pill[data-net="wa"]  { --hov: rgba(37,211,102,0.5);   --bg: rgba(37,211,102,0.08);  --shadow: rgba(37,211,102,0.3); }
    .social-pill:hover[data-net="li"] { color: #79B5F0; }
    .social-pill:hover[data-net="wa"] { color: #25D366; }
    .social-pill .lc { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .social-pill .lc-fill { fill: currentColor; stroke: none; }

    /* ===== RIGHT — back to top ===== */
    .footer-right {
      display: flex; justify-content: center;
    }
    @media (min-width: 720px) {
      .footer-right { justify-content: flex-end; }
    }
    .back-top {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 10px 18px;
      border-radius: 9999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: #a1a1aa;
      font-size: 13px; font-weight: 500;
      transition: all .25s;
    }
    .back-top:hover {
      color: #fff;
      border-color: rgba(94,234,212,0.4);
      background: rgba(94,234,212,0.05);
      transform: translateY(-2px);
    }
    .back-top .arrow {
      width: 22px; height: 22px; border-radius: 8px;
      background: rgba(94,234,212,0.12);
      border: 1px solid rgba(94,234,212,0.25);
      color: #5EEAD4;
      display: flex; align-items: center; justify-content: center;
      transition: transform .25s;
    }
    .back-top:hover .arrow { transform: translateY(-2px); }
    .back-top .arrow .lc { stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>

  <footer class="site" id="footer">
    <div class="container">
      <div class="grid">
        <!-- LEFT -->
        <div class="footer-left">
          <div class="copyright">
            <span class="brand-mini">
              <span class="brand-mini-glyph"><span class="j">J</span><span class="four">4</span></span>
            </span>
            <span>(c) 2026</span>
            <span class="word">je4n<span class="dev">dev</span></span>
            <span>· Jean Carlos Vargas</span>
          </div>
          <div class="built">Built with Next.js &amp; Tailwind CSS · Paranavaí, BR</div>
        </div>

        <!-- CENTER -->
        <div class="socials">
          <a class="social-pill" data-net="gh" href="https://github.com/JE4NVRG" target="_blank" rel="noopener" aria-label="GitHub">
            <svg class="lc" width="20" height="20" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          </a>
          <a class="social-pill" data-net="li" href="https://www.linkedin.com/in/je4ndev/" target="_blank" rel="noopener" aria-label="LinkedIn">
            <svg class="lc" width="20" height="20" viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          </a>
          <a class="social-pill" data-net="wa" href="https://wa.me/5511914826568" target="_blank" rel="noopener" aria-label="WhatsApp">
            <svg class="lc-fill" width="20" height="20" viewBox="0 0 24 24"><path d="M17.5 14.4c-.3-.1-1.8-.9-2-1-.3-.1-.5-.1-.7.1-.2.3-.8 1-1 1.2-.2.2-.3.2-.6.1-.3-.1-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.1.2 2.1 3.2 5.1 4.5.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.2-.7.2-1.3.2-1.4-.1-.1-.3-.2-.5-.3M12 21.8c-1.8 0-3.5-.5-5-1.4l-.4-.2L3.9 21l1-3.6-.2-.4C3.7 15.5 3.2 13.8 3.2 12c0-5.4 4.4-9.9 9.9-9.9 2.6 0 5.1 1 7 2.9 1.9 1.9 2.9 4.4 2.9 7-.1 5.5-4.5 9.8-10 9.8M20.4 3.5C18.2 1.3 15.2 0 12.1 0 5.5 0 .2 5.3.2 11.9c0 2.1.5 4.1 1.6 5.9L0 24l6.3-1.7c1.7 1 3.8 1.4 5.7 1.4 6.6 0 11.9-5.3 11.9-11.9 0-3.1-1.3-6.1-3.5-8.3z"/></svg>
          </a>
        </div>

        <!-- RIGHT -->
        <div class="footer-right">
          <button class="back-top" id="backTop" aria-label="Voltar ao topo">
            Voltar ao topo
            <span class="arrow">
              <svg class="lc" width="12" height="12" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </span>
          </button>
        </div>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('backTop').addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
